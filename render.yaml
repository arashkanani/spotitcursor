# Render Blueprint — Shape Match Game
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: spotitcursor
    runtime: node
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: spotitcursor-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
    # PUBLIC_URL: Render sets RENDER_EXTERNAL_URL automatically (used by the app).
