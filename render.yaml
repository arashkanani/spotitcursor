# Render Blueprint — Shape Match Game
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: spotitcursor
    runtime: node
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
    # PUBLIC_URL: Render sets RENDER_EXTERNAL_URL automatically (used by the app).
    # Optional: add a persistent disk in the Render dashboard → Mount path /var/data
    # and set DATA_DIR=/var/data to keep uploaded sponsor shapes across redeploys.
