<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · Shape Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .account-page { min-height: 100vh; display: grid; place-items: center; padding: 2rem; }
    .account-card {
      width: min(420px, 100%);
      background: rgba(15, 18, 32, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      font-family: Outfit, system-ui, sans-serif;
      color: #e8eaf4;
    }
    .account-card h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.35rem; }
    .account-card p.note { opacity: 0.75; font-size: 0.9rem; margin-bottom: 1.25rem; }
    .account-card label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.35rem; opacity: 0.9; }
    .account-card input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.25);
      color: inherit;
      font: inherit;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }
    .account-card .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    .account-card button.tab {
      flex: 1;
      padding: 0.5rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: transparent;
      color: inherit;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }
    .account-card button.tab.is-active { background: linear-gradient(120deg, #6c63ff, #9d4edd); border-color: transparent; }
    .account-card button.submit {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.25rem;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      background: linear-gradient(120deg, #00c9a7, #4cc9f0);
      color: #0b1020;
    }
    .account-card .footer { margin-top: 1.25rem; text-align: center; }
    .account-card a.back { color: #9dd6ff; text-decoration: none; font-weight: 600; }
    .account-card .err { background: rgba(255, 80, 100, 0.15); border: 1px solid rgba(255, 100, 120, 0.35); color: #ffb4c0; padding: 0.65rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.9rem; }
    #registerPanel.hidden, #loginPanel.hidden { display: none; }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="bg-vignette"></div>
  <div class="account-page">
    <div class="account-card">
      <h1>Shape Match accounts</h1>
      <p class="note">Save event layouts across visits. Anyone can host without an account.</p>

      <div class="tabs" role="tablist">
        <button type="button" class="tab is-active" data-panel="login" role="tab">Sign in</button>
        <button type="button" class="tab" data-panel="register" role="tab">Create account</button>
      </div>

      <div id="formError" class="err hidden"></div>

      <div id="loginPanel">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" autocomplete="username">

        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" autocomplete="current-password">

        <button type="button" class="submit" id="loginBtn">Sign in</button>
      </div>

      <div id="registerPanel" class="hidden">
        <label for="regEmail">Email</label>
        <input id="regEmail" type="email" autocomplete="username">

        <label for="regPassword">Password (min 8 characters)</label>
        <input id="regPassword" type="password" autocomplete="new-password">

        <button type="button" class="submit" id="registerBtn">Create account</button>
      </div>

      <div class="footer">
        <a class="back" href="/">← Host screen</a>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const nextUrl = params.get("next") || "/";

    const fetchSession = (url, opts = {}) =>
      fetch(url, { credentials: "include", ...opts });

    function showErr(msg) {
      const el = document.getElementById("formError");
      if (!msg) {
        el.classList.add("hidden");
        el.textContent = "";
        return;
      }
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    document.querySelectorAll(".tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        const panel = btn.getAttribute("data-panel");
        document.querySelectorAll(".tab").forEach((b) => b.classList.toggle("is-active", b === btn));
        document.getElementById("loginPanel").classList.toggle("hidden", panel !== "login");
        document.getElementById("registerPanel").classList.toggle("hidden", panel !== "register");
        showErr("");
      });
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      showErr("");
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const res = await fetchSession("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        showErr(data.error || "Could not sign in.");
        return;
      }
      window.location.href = nextUrl;
    });

    document.getElementById("registerBtn").addEventListener("click", async () => {
      showErr("");
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;
      const res = await fetchSession("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        showErr(data.error || "Could not register.");
        return;
      }
      window.location.href = nextUrl;
    });
  </script>
</body>
</html>
